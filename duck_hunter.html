<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Duck Hunter</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; user-select:none; }
html, body { width:100%; height:100%; overflow:hidden; background:#1a3a1a; }
#canvas { display:block; position:absolute; top:0; left:0; }
#ui { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; font-family:Arial,sans-serif; }
#score-panel { position:absolute; top:10px; left:50%; transform:translateX(-50%); display:flex; gap:10px; }
.stat-box { background:rgba(0,0,0,0.65); border:1px solid rgba(255,220,100,0.5); border-radius:7px; padding:3px 12px; color:#ffe080; font-size:10px; text-align:center; }
.stat-box span { display:block; font-size:17px; font-weight:700; color:#fff; }
#pause-btn { position:absolute; top:10px; right:12px; width:40px; height:40px; border-radius:8px; background:rgba(0,0,0,0.55); border:1px solid rgba(255,255,255,0.3); color:#fff; font-size:18px; pointer-events:all; cursor:pointer; display:flex; align-items:center; justify-content:center; }
#wave-banner { position:absolute; top:62px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.7); border:1px solid rgba(255,220,100,0.6); border-radius:8px; padding:6px 20px; color:#ffe080; font-size:14px; font-weight:700; opacity:0; transition:opacity 0.4s; pointer-events:none; white-space:nowrap; }
#joystick-zone { position:absolute; bottom:24px; left:24px; width:120px; height:120px; pointer-events:all; }
#joystick-base { width:120px; height:120px; border-radius:60px; background:rgba(0,0,0,0.45); border:2px solid rgba(255,255,255,0.3); position:relative; }
#joystick-dirs { position:absolute; top:0; left:0; width:100%; height:100%; display:flex; flex-wrap:wrap; }
.jdir { width:50%; height:50%; display:flex; align-items:center; justify-content:center; font-size:16px; color:rgba(255,255,255,0.3); pointer-events:none; }
#joystick-knob { position:absolute; width:44px; height:44px; border-radius:22px; background:rgba(255,255,255,0.8); border:2px solid #fff; top:50%; left:50%; transform:translate(-50%,-50%); }
#fire-btn { position:absolute; bottom:24px; right:24px; width:82px; height:82px; border-radius:41px; background:#cc2200; border:3px solid rgba(255,150,100,0.7); color:#fff; font-size:14px; font-weight:700; pointer-events:all; cursor:pointer; display:flex; align-items:center; justify-content:center; }
#overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.78); display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:all; gap:16px; z-index:100; }
#overlay h1 { color:#ffe080; font-size:30px; }
#overlay p { color:#ddd; font-size:13px; text-align:center; line-height:1.6; }
#pause-overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.75); display:none; flex-direction:column; align-items:center; justify-content:center; pointer-events:all; gap:18px; z-index:100; }
#pause-overlay h2 { color:#ffe080; font-size:26px; }
.btn { background:#ff4400; color:#fff; border:none; border-radius:26px; padding:13px 40px; font-size:16px; font-weight:700; cursor:pointer; pointer-events:all; }
.btn2 { background:rgba(255,255,255,0.15); color:#fff; border:1px solid rgba(255,255,255,0.4); border-radius:26px; padding:11px 32px; font-size:14px; cursor:pointer; pointer-events:all; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="ui">
  <div id="score-panel">
    <div class="stat-box">PUAN<span id="score-val">0</span></div>
    <div class="stat-box">DALGA<span id="wave-val">1</span></div>
    <div class="stat-box">KAÇAN<span id="miss-val">0/5</span></div>
  </div>
  <div id="pause-btn">⏸</div>
  <div id="wave-banner"></div>
  <div id="joystick-zone">
    <div id="joystick-base">
      <div id="joystick-dirs">
        <div class="jdir">↖</div><div class="jdir">↗</div>
        <div class="jdir">↙</div><div class="jdir">↘</div>
      </div>
      <div id="joystick-knob"></div>
    </div>
  </div>
  <div id="fire-btn">ATEŞ</div>
  <div id="pause-overlay">
    <h2>DURAKLATILDI</h2>
    <button class="btn" id="resume-btn">DEVAM ET</button>
    <button class="btn2" id="restart-btn">YENİDEN BAŞLA</button>
  </div>
  <div id="overlay">
    <h1>Duck Hunter</h1>
    <p>Sol joystick ile nişan al<br>ATEŞ butonu ile vur<br>5 ördek kaçırırsan biter</p>
    <button class="btn" id="start-btn">OYUNA BAŞLA</button>
  </div>
</div>
<script>
var canvas = document.getElementById('canvas');
var ctx = canvas.getContext('2d');
var W = window.innerWidth;
var H = window.innerHeight;
canvas.width = W;
canvas.height = H;

window.addEventListener('resize', function() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  buildBg();
});

var bgCanvas = document.createElement('canvas');
var bc = bgCanvas.getContext('2d');

function buildBg() {
  bgCanvas.width = W;
  bgCanvas.height = H;

  var g1 = bc.createLinearGradient(0, 0, 0, H * 0.46);
  g1.addColorStop(0, '#3a8fbf');
  g1.addColorStop(1, '#92cce8');
  bc.fillStyle = g1;
  bc.fillRect(0, 0, W, H * 0.46);

  bc.fillStyle = 'rgba(255,255,255,0.8)';
  bc.beginPath();
  bc.arc(W*0.1, H*0.08, H*0.04, 0, Math.PI*2);
  bc.arc(W*0.14, H*0.07, H*0.05, 0, Math.PI*2);
  bc.arc(W*0.18, H*0.08, H*0.035, 0, Math.PI*2);
  bc.fill();

  bc.beginPath();
  bc.arc(W*0.5, H*0.06, H*0.05, 0, Math.PI*2);
  bc.arc(W*0.54, H*0.05, H*0.06, 0, Math.PI*2);
  bc.arc(W*0.58, H*0.06, H*0.04, 0, Math.PI*2);
  bc.fill();

  bc.beginPath();
  bc.arc(W*0.78, H*0.09, H*0.038, 0, Math.PI*2);
  bc.arc(W*0.82, H*0.08, H*0.048, 0, Math.PI*2);
  bc.arc(W*0.86, H*0.09, H*0.033, 0, Math.PI*2);
  bc.fill();

  var g2 = bc.createLinearGradient(0, H*0.43, 0, H*0.72);
  g2.addColorStop(0, '#2475b0');
  g2.addColorStop(1, '#1a4f80');
  bc.fillStyle = g2;
  bc.fillRect(0, H*0.43, W, H*0.31);

  bc.strokeStyle = 'rgba(255,255,255,0.08)';
  bc.lineWidth = 1;
  for (var r = 0; r < 8; r++) {
    var ry = H*0.48 + r*(H*0.18/8);
    bc.beginPath();
    for (var x = 0; x < W; x += 5) {
      bc.lineTo(x, ry + Math.sin(x*0.03 + r) * 2);
    }
    bc.stroke();
  }

  var g3 = bc.createLinearGradient(0, H*0.69, 0, H);
  g3.addColorStop(0, '#4a7c3f');
  g3.addColorStop(1, '#263d20');
  bc.fillStyle = g3;
  bc.beginPath();
  bc.moveTo(0, H*0.69);
  for (var xi = 0; xi <= W; xi += 40) {
    bc.lineTo(xi, H*0.69 + Math.sin(xi*0.025)*6);
  }
  bc.lineTo(W, H); bc.lineTo(0, H); bc.closePath();
  bc.fill();

  var st = Math.max(14, Math.floor(W/50));
  for (var i = 0; i < W; i += st) {
    var rh = H*0.08 + Math.abs(Math.sin(i*0.06)) * H*0.06;
    var rx = i + Math.sin(i*4)*8;
    var ry2 = H*0.72;
    bc.strokeStyle = '#5a7a28';
    bc.lineWidth = 2;
    bc.beginPath();
    bc.moveTo(rx, ry2);
    bc.quadraticCurveTo(rx+3, ry2-rh*0.5, rx+2, ry2-rh);
    bc.stroke();
    bc.fillStyle = '#4a3008';
    bc.beginPath();
    bc.save();
    bc.translate(rx+2, ry2-rh);
    bc.scale(3, 7);
    bc.arc(0, 0, 1, 0, Math.PI*2);
    bc.restore();
    bc.fill();
  }

  bc.fillStyle = '#3a6b2f';
  bc.fillRect(0, H*0.75, W, H*0.25);

  bc.strokeStyle = '#4a8a35';
  bc.lineWidth = 1.5;
  for (var gi = 0; gi < W; gi += 7) {
    var gh = H*0.018 + Math.sin(gi*0.5)*H*0.007;
    bc.beginPath();
    bc.moveTo(gi, H*0.75);
    bc.quadraticCurveTo(gi+2, H*0.75-gh, gi+1, H*0.75-gh-2);
    bc.stroke();
  }
}

buildBg();

function drawHunter(x, y, angle, shooting) {
  ctx.save();
  ctx.translate(x, y);
  var s = H * 0.1;

  ctx.fillStyle = '#556B2F';
  ctx.save(); ctx.translate(0, s*0.1); ctx.scale(s*0.7, s*0.85);
  ctx.beginPath(); ctx.arc(0, 0, 1, 0, Math.PI*2); ctx.restore(); ctx.fill();

  ctx.fillStyle = '#8B4513';
  ctx.save(); ctx.translate(0, -s*0.2); ctx.scale(s*0.55, s*0.55);
  ctx.beginPath(); ctx.arc(0, 0, 1, 0, Math.PI*2); ctx.restore(); ctx.fill();

  ctx.fillStyle = '#D2A679';
  ctx.save(); ctx.translate(0, -s*1.05); ctx.scale(s*0.5, s*0.58);
  ctx.beginPath(); ctx.arc(0, 0, 1, 0, Math.PI*2); ctx.restore(); ctx.fill();

  ctx.fillStyle = '#7a5a10';
  ctx.save(); ctx.translate(0, -s*1.4); ctx.scale(s*0.68, s*0.18);
  ctx.beginPath(); ctx.arc(0, 0, 1, 0, Math.PI*2); ctx.restore(); ctx.fill();

  ctx.fillStyle = '#8B6914';
  ctx.fillRect(-s*0.38, -s*2.02, s*0.76, s*0.65);

  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(-s*0.16, -s*1.1, s*0.08, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s*0.16, -s*1.1, s*0.08, 0, Math.PI*2); ctx.fill();

  ctx.strokeStyle = '#4a3a20'; ctx.lineWidth = s*0.04;
  ctx.beginPath(); ctx.arc(-s*0.16, -s*1.1, s*0.17, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(s*0.16, -s*1.1, s*0.17, 0, Math.PI*2); ctx.stroke();

  ctx.fillStyle = '#5a4030';
  ctx.save(); ctx.translate(-s*0.14, -s*0.88); ctx.rotate(0.25); ctx.scale(s*0.16, s*0.07);
  ctx.beginPath(); ctx.arc(0, 0, 1, 0, Math.PI*2); ctx.restore(); ctx.fill();
  ctx.save(); ctx.translate(s*0.14, -s*0.88); ctx.rotate(-0.25); ctx.scale(s*0.16, s*0.07);
  ctx.beginPath(); ctx.arc(0, 0, 1, 0, Math.PI*2); ctx.restore(); ctx.fill();

  ctx.save();
  ctx.rotate(angle);

  ctx.fillStyle = '#556B2F';
  ctx.fillRect(s*0.1, -s*0.2, s*1.3, s*0.38);

  ctx.fillStyle = '#5C3A28';
  ctx.fillRect(s*1.0, -s*0.16, s*1.7, s*0.28);

  ctx.fillStyle = '#222';
  ctx.fillRect(s*2.4, -s*0.1, s*1.0, s*0.16);

  if (shooting) {
    ctx.fillStyle = 'rgba(255,220,60,0.95)';
    ctx.beginPath(); ctx.arc(s*3.4, 0, s*0.28, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,120,0,0.5)';
    ctx.beginPath(); ctx.arc(s*3.4, 0, s*0.48, 0, Math.PI*2); ctx.fill();
  }

  ctx.restore();
  ctx.restore();
}

function drawDuck(d) {
  ctx.save();
  ctx.translate(d.x, d.y);

  if (d.hit) {
    ctx.rotate(d.hitAnim * Math.PI * 2.5);
    ctx.globalAlpha = Math.max(0, 1 - d.hitAnim * 0.7);
  } else {
    ctx.scale(d.dir > 0 ? 1 : -1, 1);
  }

  var s = H * 0.055;
  var w = Math.sin(Date.now() * 0.015) * 0.32;

  ctx.fillStyle = '#1e5c32';
  ctx.save(); ctx.rotate(-0.3 + w); ctx.translate(-s*0.3, -s*0.35); ctx.scale(s*0.95, s*0.42);
  ctx.beginPath(); ctx.arc(0, 0, 1, 0, Math.PI*2); ctx.restore(); ctx.fill();

  ctx.save(); ctx.rotate(0.3 - w); ctx.translate(-s*0.3, s*0.35); ctx.scale(s*0.95, s*0.42);
  ctx.beginPath(); ctx.arc(0, 0, 1, 0, Math.PI*2); ctx.restore(); ctx.fill();

  ctx.fillStyle = '#2a7a46';
  ctx.save(); ctx.translate(0, 0); ctx.scale(s*0.88, s*0.58);
  ctx.beginPath(); ctx.arc(0, 0, 1, 0, Math.PI*2); ctx.restore(); ctx.fill();

  ctx.fillStyle = '#164d28';
  ctx.save(); ctx.translate(s*0.82, -s*0.32); ctx.rotate(0.28); ctx.scale(s*0.52, s*0.42);
  ctx.beginPath(); ctx.arc(0, 0, 1, 0, Math.PI*2); ctx.restore(); ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(s*1.04, -s*0.4, s*0.13, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(s*1.08, -s*0.41, s*0.07, 0, Math.PI*2); ctx.fill();

  ctx.fillStyle = '#e09010';
  ctx.beginPath();
  ctx.moveTo(s*1.3, -s*0.28);
  ctx.lineTo(s*1.65, -s*0.24);
  ctx.lineTo(s*1.65, -s*0.13);
  ctx.lineTo(s*1.3, -s*0.17);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

var state = 'menu';
var paused = false;
var score = 0;
var missed = 0;
var wave = 1;
var ducks = [];
var particles = [];
var aimAngle = -(Math.PI / 4);
var shooting = false;
var shootTimer = 0;
var ducksSpawned = 0;
var ducksForWave = 7;
var spawnInterval = 2200;
var lastSpawn = 0;
var waveTransition = false;
var MISS_MAX = 5;

var DIRS = [
  { a: -Math.PI*3/4, dx:-1, dy:-1 },
  { a: -Math.PI/4,   dx: 1, dy:-1 },
  { a:  Math.PI/4,   dx: 1, dy: 1 },
  { a:  Math.PI*3/4, dx:-1, dy: 1 }
];

function makeDuck() {
  var corners = [
    { sx:-60, sy:H*0.05 },
    { sx:W+60, sy:H*0.05 },
    { sx:-60,  sy:-60 },
    { sx:W+60, sy:-60 }
  ];
  var c = corners[Math.floor(Math.random() * 4)];
  var spd = 1.4 + wave*0.3 + Math.random()*0.5;
  var tx = W*0.25 + Math.random()*W*0.5;
  var ty = H*0.15 + Math.random()*H*0.35;
  var dx = tx - c.sx;
  var dy = ty - c.sy;
  var len = Math.sqrt(dx*dx + dy*dy);
  return {
    x: c.sx, y: c.sy,
    vx: dx/len*spd, vy: dy/len*spd,
    dir: c.sx < 0 ? 1 : -1,
    hit: false, hitAnim: 0,
    escaped: false,
    points: 10 + wave*5
  };
}

function spawnDucks() {
  var cnt = (wave >= 3 && Math.random() < 0.4) ? 2 : 1;
  for (var i = 0; i < cnt; i++) {
    if (ducksSpawned < ducksForWave) {
      ducks.push(makeDuck());
      ducksSpawned++;
    }
  }
}

function startWave(w) {
  wave = w;
  ducks = [];
  particles = [];
  ducksSpawned = 0;
  waveTransition = false;
  ducksForWave = 5 + w*2;
  spawnInterval = Math.max(800, 2200 - w*200);
  lastSpawn = Date.now() - spawnInterval + 400;
  document.getElementById('wave-val').textContent = w;
  var wb = document.getElementById('wave-banner');
  wb.textContent = 'DALGA ' + w;
  wb.style.opacity = '1';
  setTimeout(function() { wb.style.opacity = '0'; }, 2000);
  updateHUD();
}

function startGame() {
  score = 0; missed = 0; paused = false;
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('pause-overlay').style.display = 'none';
  document.getElementById('pause-btn').textContent = '⏸';
  state = 'playing';
  startWave(1);
}

function updateHUD() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('miss-val').textContent = missed + '/' + MISS_MAX;
}

function showGameOver() {
  state = 'gameover';
  var ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  ov.innerHTML = '<h1>OYUN BİTTİ</h1><p>Puan: <b style="color:#ffe080;font-size:22px">' + score + '</b><br>Dalga: ' + wave + '</p><button class="btn" id="rf">TEKRAR OYNA</button>';
  document.getElementById('rf').addEventListener('click', startGame);
  document.getElementById('rf').addEventListener('touchend', function(e) { e.preventDefault(); startGame(); });
}

function togglePause() {
  if (state !== 'playing') return;
  paused = !paused;
  if (paused) {
    document.getElementById('pause-overlay').style.display = 'flex';
    document.getElementById('pause-btn').textContent = '▶';
  } else {
    document.getElementById('pause-overlay').style.display = 'none';
    document.getElementById('pause-btn').textContent = '⏸';
    lastSpawn = Date.now();
  }
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('start-btn').addEventListener('touchend', function(e) { e.preventDefault(); startGame(); });
document.getElementById('pause-btn').addEventListener('click', togglePause);
document.getElementById('pause-btn').addEventListener('touchend', function(e) { e.preventDefault(); togglePause(); });
document.getElementById('resume-btn').addEventListener('click', togglePause);
document.getElementById('resume-btn').addEventListener('touchend', function(e) { e.preventDefault(); togglePause(); });
document.getElementById('restart-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('touchend', function(e) { e.preventDefault(); startGame(); });

var joyBase = document.getElementById('joystick-base');
var joyKnob = document.getElementById('joystick-knob');
var joyZone = document.getElementById('joystick-zone');
var joyActive = false;
var joyId = null;
var joyBX = 0;
var joyBY = 0;
var JR = 44;

function nearestDir(dx, dy) {
  var best = 0;
  var bestDot = -999;
  for (var i = 0; i < DIRS.length; i++) {
    var dot = dx*DIRS[i].dx + dy*DIRS[i].dy;
    if (dot > bestDot) { bestDot = dot; best = i; }
  }
  return DIRS[best];
}

function moveJoy(cx, cy) {
  var dx = cx - joyBX;
  var dy = cy - joyBY;
  if (Math.sqrt(dx*dx + dy*dy) > 10) {
    var d = nearestDir(dx, dy);
    aimAngle = d.a;
    joyKnob.style.transform = 'translate(calc(-50% + ' + (d.dx*JR) + 'px), calc(-50% + ' + (d.dy*JR) + 'px))';
  } else {
    joyKnob.style.transform = 'translate(-50%, -50%)';
  }
}

joyZone.addEventListener('touchstart', function(e) {
  e.preventDefault();
  var t = e.changedTouches[0];
  joyId = t.identifier;
  var r = joyBase.getBoundingClientRect();
  joyBX = r.left + r.width/2;
  joyBY = r.top + r.height/2;
  joyActive = true;
  moveJoy(t.clientX, t.clientY);
}, {passive: false});

joyZone.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (!joyActive) return;
  for (var i = 0; i < e.changedTouches.length; i++) {
    if (e.changedTouches[i].identifier === joyId) {
      moveJoy(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
      break;
    }
  }
}, {passive: false});

joyZone.addEventListener('touchend', function(e) {
  e.preventDefault();
  joyActive = false;
  joyKnob.style.transform = 'translate(-50%, -50%)';
}, {passive: false});

joyZone.addEventListener('mousedown', function(e) {
  var r = joyBase.getBoundingClientRect();
  joyBX = r.left + r.width/2;
  joyBY = r.top + r.height/2;
  joyActive = true;
  moveJoy(e.clientX, e.clientY);
});
window.addEventListener('mousemove', function(e) { if (joyActive) moveJoy(e.clientX, e.clientY); });
window.addEventListener('mouseup', function() {
  joyActive = false;
  joyKnob.style.transform = 'translate(-50%, -50%)';
});

function doFire() {
  if (state !== 'playing' || paused) return;
  shooting = true;
  shootTimer = 200;
  var ox = W*0.5;
  var oy = H*0.75;
  var adx = Math.cos(aimAngle);
  var ady = Math.sin(aimAngle);
  for (var i = 0; i < ducks.length; i++) {
    var d = ducks[i];
    if (d.hit || d.escaped) continue;
    var ddx = d.x - ox;
    var ddy = d.y - oy;
    var dist = Math.sqrt(ddx*ddx + ddy*ddy);
    if (dist < 1) continue;
    var dot = (ddx*adx + ddy*ady) / dist;
    var ang = Math.acos(Math.min(1, Math.max(-1, dot)));
    if (dist < W*0.65 && ang < 0.44) {
      d.hit = true;
      score += d.points;
      var cols = ['#4a9c40','#e8a020','#fff','#c0e060'];
      for (var p = 0; p < 12; p++) {
        particles.push({
          x: d.x, y: d.y,
          vx: (Math.random()-0.5)*6,
          vy: (Math.random()-0.5)*6,
          life: 1,
          col: cols[Math.floor(Math.random()*4)]
        });
      }
      updateHUD();
      break;
    }
  }
}

document.getElementById('fire-btn').addEventListener('touchstart', function(e) { e.preventDefault(); doFire(); }, {passive: false});
document.getElementById('fire-btn').addEventListener('click', doFire);

var lastTs = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  var dt = Math.min(ts - lastTs, 50);
  lastTs = ts;

  ctx.clearRect(0, 0, W, H);
  ctx.drawImage(bgCanvas, 0, 0, W, H);

  if (state !== 'playing' || paused) return;

  var now = Date.now();
  if (ducksSpawned < ducksForWave && now - lastSpawn > spawnInterval) {
    spawnDucks();
    lastSpawn = now;
  }

  var alive = 0;
  for (var i = 0; i < ducks.length; i++) {
    if (!ducks[i].hit && !ducks[i].escaped) alive++;
  }
  if (!waveTransition && ducksSpawned >= ducksForWave && alive === 0) {
    waveTransition = true;
    setTimeout(function() { startWave(wave + 1); }, 2000);
  }

  for (var i = 0; i < ducks.length; i++) {
    var d = ducks[i];
    if (d.hit) {
      d.hitAnim += 0.03;
      d.y += 4 + d.hitAnim*4;
      d.x += d.vx*0.15;
    } else if (!d.escaped) {
      d.x += d.vx;
      d.y += d.vy;
      if (d.y > H*0.15 && d.y < H*0.6 && d.x > 0 && d.x < W) {
        d.vx += (Math.random()-0.5)*0.08;
        if (d.vx > 3) d.vx = 3;
        if (d.vx < -3) d.vx = -3;
      }
      if (d.y > H*0.8 || d.y < -100 || d.x < -150 || d.x > W+150) {
        if (!d.hit) {
          d.escaped = true;
          missed++;
          updateHUD();
          if (missed >= MISS_MAX) setTimeout(showGameOver, 400);
        }
      }
    }
    if (!d.escaped && !(d.hit && d.hitAnim > 1.8)) drawDuck(d);
  }

  for (var i = particles.length-1; i >= 0; i--) {
    var p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.03;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.x, p.y, 5*p.life, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  shootTimer -= dt;
  if (shootTimer < 0) shooting = false;

  drawHunter(W*0.5, H*0.75, aimAngle, shooting);

  ctx.fillStyle = '#ffe080';
  ctx.font = 'bold 14px Arial';
  ctx.textAlign = 'center';
  for (var i = 0; i < ducks.length; i++) {
    var d = ducks[i];
    if (d.hit && d.hitAnim < 0.5) {
      ctx.globalAlpha = 1 - d.hitAnim*2;
      ctx.fillText('+' + d.points, d.x, d.y - 30 - d.hitAnim*20);
      ctx.globalAlpha = 1;
    }
  }
}

requestAnimationFrame(loop);
</script>
</body>
</html>
